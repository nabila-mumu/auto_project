# [General]
# network = simulations.MyNetwork
[General]
network = src.RingNetwork
# sim-time-limit = 1000s

# Channel parameters
**.delay = 20ms
**.datarate = 2Mbps

# Failure examples
*.node[9].crashTime = 10s
*.node[8].crashTime = 10s

# Timeout tuning
**.electionTimeout = 1.5s
**.stopDelay = 2s

# Optional (for terminal mode)
cmdenv-express-mode = false
**.allowunconnected = true

# cmdenv-log-level = info
**.cmdenv-log-level = debug
