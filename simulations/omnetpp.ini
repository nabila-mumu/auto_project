[General]
network = src.RaftNetwork
sim-time-limit = 1000s

*.node[*].crashTime = exponential(1.25s)
*.node[*].recoveryTime = exponential(0.25s)
*.node[*].electionTimeout = uniform(0.15s, 0.5s)
*.node[*].stopDelay = 1s

# false = unidirectional ring
# true = bidirectional bully/raft
*.node[*].bidirectional = true
# Optional (for terminal mode)
cmdenv-express-mode = false
**.allowunconnected = true

# cmdenv-log-level = info
**.cmdenv-log-level = debug
